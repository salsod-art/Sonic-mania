<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="coi-serviceworker.js"></script>
    <title>RSDKv4 Debug Build</title>
    <style>
        body { background: #111; color: #00ff00; display: flex; flex-direction: column; align-items: center; font-family: monospace; margin-top: 20px; }
        canvas { border: 2px solid #444; width: 800px; height: 450px; background: #000; }
        #status { margin-top: 15px; font-size: 14px; color: #0f0; background: #000; padding: 5px; width: 800px; border: 1px solid #333; }
        #debug-log { width: 800px; height: 100px; overflow-y: scroll; font-size: 11px; color: #aaa; margin-top: 10px; background: #000; border: 1px solid #333; padding: 5px; }
    </style>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <div id="status">System Standby...</div>
    <div id="debug-log">Debug Console Initialized...<br></div>

<script type='text/javascript'>
  const statusElement = document.getElementById('status');
  const debugElement = document.getElementById('debug-log');

  function logDebug(msg, color = "#aaa") {
      console.log("DEBUG: " + msg);
      debugElement.innerHTML += `<span style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</span><br>`;
      debugElement.scrollTop = debugElement.scrollHeight;
  }

  var Module = {
    canvas: document.getElementById('canvas'),
    // Track every time the engine tries to open a file
    onRuntimeInitialized: function() {
        logDebug("WASM Runtime Ready. Main loop starting...", "#fff");
    },
    print: (text) => logDebug("ENGINE: " + text, "#0f0"),
    printErr: (text) => logDebug("ENGINE-ERR: " + text, "#f44"),
    setStatus: (text) => {
        if (statusElement) statusElement.innerHTML = text;
        logDebug("Status: " + text, "#55f");
    },
    
    preRun: [function() {
        // Intercepting File System calls to see what the engine is looking for
        const originalOpen = Module.FS_createDataFile;
        logDebug("Hooking File System...", "#ff0");

        Module.addRunDependency('split-data'); 
        
        (async () => {
            const parts = ['Data.rsdk.part1', 'Data.rsdk.part2', 'Data.rsdk.part3', 'Data.rsdk.part4'];
            try {
                logDebug("Fetching parts...");
                const responses = await Promise.all(parts.map(p => fetch(p)));
                const buffers = await Promise.all(responses.map(r => r.arrayBuffer()));
                
                let totalLength = buffers.reduce((acc, buf) => acc + buf.byteLength, 0);
                let combined = new Uint8Array(totalLength);
                let offset = 0;
                for (let buf of buffers) {
                    combined.set(new Uint8Array(buf), offset);
                    offset += buf.byteLength;
                }

                // 1. TRY LOWERCASE 'data.rsdk' JUST IN CASE
                Module.FS_createDataFile('/', 'data.rsdk', combined, true, true, true);
                // 2. ALSO PROVIDE UPPERCASE 'Data.rsdk' (Linked to same data)
                Module.FS_createDataFile('/', 'Data.rsdk', combined, true, true, true);
                
                const settings = `[Video]\nWindowed=0\nRenderer=0\nfsWidth=800\nfsHeight=450\n`;
                Module.FS_createDataFile('/', 'settings.ini', new TextEncoder().encode(settings), true, true, true);

                logDebug("VFS Snapshot: " + Module.FS.readdir('/').join(', '), "#0ff");
                
                logDebug("Checking WASM exports...");
                if (Module['_main']) logDebug("Found _main entry point.");

                logDebug("CRITICAL: Click the canvas NOW to ensure AudioContext starts.", "#f0f");
                Module.removeRunDependency('split-data'); 
            } catch (e) {
                logDebug("BOOT ERR: " + e.message, "#f00");
            }
        })();
    }]
  };
</script>

    <script src="RSDKv4.js"></script>
</body>
</html>
