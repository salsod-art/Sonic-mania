<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="coi-serviceworker.js"></script>
    <title>RSDKv4 Web Port</title>
    <style>
        body { background: #111; color: #00ff00; display: flex; flex-direction: column; align-items: center; font-family: monospace; }
        canvas { border: 2px solid #444; width: 800px; height: 450px; background: #000; }
        #status { margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <div id="status">Initializing...</div>

    <script type='text/javascript'>
      var statusElement = document.getElementById('status');
      
      // The Engine looks for this global variable
      var Module = {
        canvas: document.getElementById('canvas'),
        print: (text) => console.log(text),
        printErr: (text) => console.error(text),
        setStatus: (text) => {
            if (statusElement) statusElement.innerHTML = text;
        },
        
        preRun: [function() {
            // This is the logic to stitch your .part files back together
            Module.addRunDependency('split-data'); 
            
            (async () => {
                const parts = [
                    'Data.rsdk.part1', 
                    'Data.rsdk.part2', 
                    'Data.rsdk.part3', 
                    'Data.rsdk.part4'
                ];
                
                try {
                    Module.setStatus("Downloading Parts...");
                    const responses = await Promise.all(parts.map(p => fetch(p)));
                    
                    for (let res of responses) {
                        if (!res.ok) throw new Error("Could not find " + res.url);
                    }

                    const buffers = await Promise.all(responses.map(r => r.arrayBuffer()));
                    Module.setStatus("Stitching Data...");
                    
                    let totalLength = buffers.reduce((acc, buf) => acc + buf.byteLength, 0);
                    let combined = new Uint8Array(totalLength);
                    let offset = 0;
                    for (let buf of buffers) {
                        combined.set(new Uint8Array(buf), offset);
                        offset += buf.byteLength;
                    }
                    
                    // Create the Data.rsdk file in the virtual drive
                    Module.FS_createDataFile('/', 'Data.rsdk', combined, true, true, true);
                    
                    Module.setStatus("Ready! Starting Sonic...");
                    Module.removeRunDependency('split-data'); 
                } catch (e) {
                    Module.setStatus("ERROR: " + e.message);
                }
            })();
        }]
      };
    </script>

    <script src="RSDKv4.js"></script>
</body>
</html>
