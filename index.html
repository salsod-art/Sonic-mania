<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="coi-serviceworker.js"></script>
    <title>Sonic 2 Mobile Port</title>
    <style>
        body { background: #111; color: #0f0; display: flex; flex-direction: column; align-items: center; font-family: monospace; }
        canvas { border: 2px solid #333; width: 800px; height: 450px; background: #000; margin-top: 20px; }
        #status { margin: 15px; font-size: 14px; color: #fff; }
    </style>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <div id="status">Preparing...</div>

    <script type='text/javascript'>
      var Module = {
        canvas: document.getElementById('canvas'),
        print: (text) => console.log(text),
        printErr: (text) => console.error(text),
        setStatus: (text) => { document.getElementById('status').innerHTML = text; },

        preRun: [function() {
            Module.addRunDependency('data'); 
            (async () => {
                try {
                    Module.setStatus("Fetching Data...");
                    const parts = ['Data.rsdk.part1', 'Data.rsdk.part2'];
                    const res = await Promise.all(parts.map(p => fetch(p)));
                    const bufs = await Promise.all(res.map(r => r.arrayBuffer()));
                    
                    const combined = new Uint8Array(bufs[0].byteLength + bufs[1].byteLength);
                    combined.set(new Uint8Array(bufs[0]), 0);
                    combined.set(new Uint8Array(bufs[1]), bufs[0].byteLength);

                    // Standard names
                    Module.FS_createDataFile('/', 'Data.rsdk', combined, true, true, true);
                    Module.FS_createDataFile('/', 'data.rsdk', combined, true, true, true);
                    
                    // CRITICAL: This tells the engine to act like the Mobile version
                    // and enables the Dev Menu so we can escape the black screen.
                    const ini = "[Video]\nWindowed=0\nRenderer=0\n[Game]\nLanguage=0\nDevMenu=1\nEngineType=1\n";
                    Module.FS_createDataFile('/', 'settings.ini', new TextEncoder().encode(ini), true, true, true);

                    Module.setStatus("Ready! Click canvas and press Enter.");
                    Module.removeRunDependency('data'); 
                } catch (e) {
                    Module.setStatus("Error: " + e.message);
                }
            })();
        }]
      };
    </script>
    <script src="RSDKv4.js"></script>
</body>
</html>
