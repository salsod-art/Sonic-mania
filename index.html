<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="coi-serviceworker.js"></script>
    <title>Sonic 2 Web Port</title>
    <style>
        body { background: #111; color: #0f0; display: flex; flex-direction: column; align-items: center; font-family: monospace; margin-top: 20px; }
        canvas { border: 2px solid #333; width: 800px; height: 450px; background: #000; cursor: pointer; }
        #debug-log { width: 800px; height: 180px; overflow-y: scroll; font-size: 11px; color: #888; background: #000; padding: 10px; border: 1px solid #222; margin-top: 10px; }
    </style>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <div id="debug-log">Ready for boot...</div>

    <script type='text/javascript'>
      const debugElement = document.getElementById('debug-log');
      function logDebug(msg, color = "#888") {
          debugElement.innerHTML += `<div style="color:${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
          debugElement.scrollTop = debugElement.scrollHeight;
      }

      var Module = {
        canvas: document.getElementById('canvas'),
        print: (text) => logDebug("ENGINE: " + text, "#4f4"),
        printErr: (text) => {
            // Filter out common harmless warnings to find the real error
            if (!text.includes("GL emulation")) logDebug("WASM-ERR: " + text, "#f44");
        },
        
        onRuntimeInitialized: function() {
            logDebug("--- ENGINE ONLINE ---", "#fff");
            logDebug("1. CLICK THE CANVAS", "#f0f");
            logDebug("2. PRESS 'ENTER' TO START", "#f0f");
        },

        preRun: [function() {
            Module.addRunDependency('split-data'); 
            
            (async () => {
                const parts = ['Data.rsdk.part1', 'Data.rsdk.part2'];
                try {
                    logDebug("Downloading Mobile Assets...");
                    const responses = await Promise.all(parts.map(p => fetch(p)));
                    const buffers = await Promise.all(responses.map(r => r.arrayBuffer()));
                    
                    let totalLength = buffers.reduce((a, b) => a + b.byteLength, 0);
                    let combined = new Uint8Array(totalLength);
                    let offset = 0;
                    for (let b of buffers) { 
                        combined.set(new Uint8Array(b), offset); 
                        offset += b.byteLength; 
                    }

                    // Write filenames for all possible cases (Sonic 2 is picky)
                    Module.FS_createDataFile('/', 'Data.rsdk', combined, true, true, true);
                    Module.FS_createDataFile('/', 'data.rsdk', combined, true, true, true);
                    
                    // Force Video and Engine settings
                    // DevMenu=1 allows us to press 'ESC' to see if the engine is alive
                    const settings = "[Video]\nWindowed=0\nfsWidth=800\nfsHeight=450\nRenderer=0\n[Game]\nDevMenu=1\n";
                    Module.FS_createDataFile('/', 'settings.ini', new TextEncoder().encode(settings), true, true, true);

                    logDebug("FS Check: " + Module.FS.readdir('/').join(', '), "#0ff");
                    Module.removeRunDependency('split-data'); 
                } catch (e) {
                    logDebug("FATAL: " + e.message, "#f00");
                }
            })();
        }]
      };
    </script>
    <script src="RSDKv4.js"></script>
</body>
</html>
